name: "Setup uv environment"
description: "Install system deps, Python, uv, and project dependencies"
inputs:
  docs:
    type: choice
    description: "Enable --group docs flag for uv sync"
    required: false
    default: "false"
    options:
      - "false"
      - "true"
runs:
  using: "composite"
  steps:
    - name: Install system dependencies
      run: |
        sudo apt-get update --allow-releaseinfo-change
        if [ "${{ inputs.docs }}" = "false" ]; then
          sudo apt-get install qpdf
        fi
      shell: bash

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version-file: ".python-version"

    - name: Install uv
      uses: astral-sh/setup-uv@v7.2.0
      with:
        version: "0.8.12"
        enable-cache: true
        cache-dependency-glob: ".pre-commit-config.yaml"

    - name: Install dependencies
      run: |
        if [ "${{ inputs.docs }}" = "true" ]; then
          uv sync --locked --all-extras --group docs
        else
          uv sync --locked --all-extras --dev
        fi
      shell: bash
