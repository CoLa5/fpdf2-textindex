name: CI

on:
  pull_request:
    branches: ["main", "dev"]
  push:
    branches: ["main", "dev"]

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-uv

      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key:
            pre-commit-3|${{ env.pythonLocation }}|${{
            hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run:
          uv run --no-sync --with pre-commit-uv pre-commit run --all-files
          --color=always --hook-stage=manual --show-diff-on-failure
        shell: bash

  test:
    name: Test
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-uv

      - name: Run tests
        run: |
          # Ensuring there is no `generate=True` left in calls to
          # assert_pdf_equal
          grep -IRF generate=True test/ && exit 1
          # Create HTML coverage files if in main-branch
          COV_HTML=""
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            COV_HTML="--cov-report html:public/coverage"
          fi
          # Executing all test
          uv run pytest \
          --cov-report markdown-append:$GITHUB_STEP_SUMMARY $COV_HTML -vv

      - name: Upload coverage report artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: artifact-coverage
          path: public/

  example-pdf:
    name: Example PDF
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-uv

      - name: Create example pdf
        run: |
          cd example
          uv run python textindex_figures.py
          mkdir -p public/assets
          cp textindex_figures.pdf ../public/assets/

      - name: Upload example artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-example
          path: public/

  docs:
    name: Build Docs
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-uv
        with:
          docs: true

      - name: Create docs
        run: |
          mkdir -p public
          uv run python docs/make.py

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-docs
          path: public/

  pages-collect:
    name: Collect Docs
    if: github.ref == 'refs/heads/main'
    needs: [test, docs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: public/
          pattern: artifact-*
          merge-multiple: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  pages-deploy:
    name: Deploy Docs
    if: github.ref == 'refs/heads/main'
    needs: pages-collect
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
