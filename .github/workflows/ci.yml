name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main", "dev"]
    tags: ["v*.*.*", "v*.*.*alpha*", "v*.*.*beta*"]

permissions:
  contents: read

jobs:
  pre-commit: # https://github.com/pre-commit/action/blob/main/action.yml
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-uv

      - name: Cache pre-commit
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #v5.0.5
        with:
          path: ~/.cache/pre-commit
          key:
            pre-commit-3|${{ env.pythonLocation }}|${{
            hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        env:
          PRE_COMMIT_OUTPUT: pre_commit_report.md
        shell: bash
        run: |
          uv run --no-sync --with pre-commit-uv pre-commit run --all-files \
          --color=always --hook-stage=manual --show-diff-on-failure |
          uv run python scripts/pre_commit_md_report.py \
          --report "markdown:${PRE_COMMIT_OUTPUT}"
          echo "PRE_COMMIT_FILE=${PRE_COMMIT_OUTPUT}" >> "$GITHUB_ENV"

      - name: Output pre-commit report to the job summary
        if: always()
        shell: bash
        run: |
          if [ -f "$PRE_COMMIT_FILE" ]; then
            echo "<details><summary>Pre-Commit Report</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat "$PRE_COMMIT_FILE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

  test:
    name: Test
    needs: pre-commit
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        platform: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install qpdf on Ubuntu
        if: startsWith(matrix.platform, 'ubuntu') && inputs.docs == false
        shell: bash
        run: |
          sudo apt-get update --allow-releaseinfo-change
          sudo apt-get install qpdf
          qpdf --version

      - name: Install qpdf on Windows
        if: startsWith(matrix.platform, 'windows')
        shell: pwsh
        run: |
          choco install qpdf -y
          qpdf --version

      - uses: ./.github/actions/setup-uv
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        env:
          COVERAGE_OUTPUT: cov_report.md
          TEST_OUTPUT: test_report.md
        shell: bash
        run: |
          # Ensuring there is no `generate=True` left in calls to
          # assert_pdf_equal
          grep -IRF generate=True test/ && exit 1
          # Create HTML coverage files if in main-branch
          COV_HTML=""
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            COV_HTML="--cov-report html"
          fi
          # Executing all test
          uv run pytest -v \
          --cov-report "markdown:${COVERAGE_OUTPUT}" \
          $COV_HTML \
          --md-report --md-report-exclude-outcomes skipped \
          --md-report-output "$TEST_OUTPUT"
          echo "COVERAGE_FILE=${COVERAGE_OUTPUT}" >> "$GITHUB_ENV"
          echo "TEST_FILE=${TEST_OUTPUT}" >> "$GITHUB_ENV"

      - name: Output coverage / test reports to the job summary
        if: always()
        shell: bash
        run: |
          if [ -f "$TEST_FILE" ]; then
            echo "<details><summary>Test Report</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat "$TEST_FILE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "$COVERAGE_FILE" ]; then
            echo "<details><summary>Coverage Report</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat "$COVERAGE_FILE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage report artifact
        if: |
          github.ref == 'refs/heads/main' &&
          startsWith(matrix.platform, 'ubuntu') &&
          matrix.python-version == env.UV_PYTHON
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifact-coverage
          path: public/

      - name: Get total coverage
        if: |
          github.ref == 'refs/heads/main' &&
          startsWith(matrix.platform, 'ubuntu') &&
          matrix.python-version == env.UV_PYTHON
        id: set_total
        shell: bash
        run: |
          echo "total=$( uv run python -m coverage report --format=total )" >> $GITHUB_OUTPUT

      - name: Create coverage badge
        if: |
          github.ref == 'refs/heads/main' &&
          startsWith(matrix.platform, 'ubuntu') &&
          matrix.python-version == env.UV_PYTHON
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: d548905d5994ebc1c3f15e8cfb9003e2
          filename: covbadge.json
          label: Coverage
          message: ${{ steps.set_total.outputs.total }}%
          minColorRange: 60
          maxColorRange: 95
          valColorRange: ${{ steps.set_total.outputs.total }}

  docs:
    name: Build Docs
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-uv
        with:
          docs: true

      - name: Create docs
        shell: bash
        run: |
          mkdir -p public
          uv run python docs/make.py

      - name: Upload docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifact-docs
          path: public/

  example:
    name: Example PDF
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-uv

      - name: Create example pdf
        shell: bash
        run: |
          uv run python example/textindex_figures.py
          mkdir -p public/assets
          cp textindex_figures.pdf public/assets/

      - name: Upload example artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifact-example
          path: public/

  pages-collect:
    name: Collect Docs
    if: github.ref == 'refs/heads/main'
    needs: [test, docs, example]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: public/
          pattern: artifact-*
          merge-multiple: true

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: public/

  pages-deploy:
    name: Deploy Docs
    if: github.ref == 'refs/heads/main'
    needs: pages-collect
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
