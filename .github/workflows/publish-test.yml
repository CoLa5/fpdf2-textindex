name: Publish to Test.Pypi

on:
  push:
    tags: ["v*.*.*", "v*.*.*alpha*", "v*.*.*beta*"]

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: test-pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-uv

      - name: Build
        run: |
          uv build
          uv run python scripts/pip_hashes_md_report.py >> $GITHUB_STEP_SUMMARY

      - name: Smoke test (wheel & source distribution)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          uv run --isolated --no-project --with dist/fpdf2_textindex-${VERSION}-py3-none-any.whl test/smoke_test.py
          uv run --isolated --no-project --with dist/fpdf2_textindex-${VERSION}.tar.gz test/smoke_test.py

      - name: Publish
        run: uv publish --index testpypi
